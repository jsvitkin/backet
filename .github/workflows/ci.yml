name: CI

on:
  pull_request:
  push:

jobs:
  test:
    name: Test (${{ matrix.os }}, py${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            python-version: "3.11"
          - os: ubuntu-latest
            python-version: "3.13"
          - os: macos-latest
            python-version: "3.13"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install development dependencies
        run: python -m pip install -e ".[dev]"
      - name: Run tests with coverage
        run: pytest --cov=backet --cov-report=term-missing

  smoke-install:
    name: Smoke Install (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: test
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install build dependency
        run: python -m pip install build
      - name: Build wheel
        run: python -m build --wheel
      - name: Run install/bootstrap smoke test
        run: scripts/smoke-install.sh dist/*.whl "$GITHUB_WORKSPACE"
