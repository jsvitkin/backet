name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  test:
    name: Release Tests (${{ matrix.os }}, py${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            python-version: "3.11"
          - os: ubuntu-latest
            python-version: "3.13"
          - os: macos-latest
            python-version: "3.13"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install development dependencies
        run: python -m pip install -e ".[dev]"
      - name: Run tests with coverage
        run: pytest --cov=backet --cov-report=term-missing

  build-wheel:
    name: Build Wheel
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install build dependency
        run: python -m pip install build
      - name: Build wheel
        run: python -m build --wheel
      - uses: actions/upload-artifact@v4
        with:
          name: built-wheel
          path: dist/*.whl

  smoke-install:
    name: Release Smoke (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: build-wheel
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - uses: actions/download-artifact@v4
        with:
          name: built-wheel
          path: dist
      - name: Run install/bootstrap smoke test
        run: scripts/smoke-install.sh dist/*.whl "$GITHUB_WORKSPACE"

  publish-release:
    name: Publish Release
    runs-on: ubuntu-latest
    needs:
      - build-wheel
      - smoke-install
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: built-wheel
          path: dist
      - name: Publish GitHub release artifact
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.whl
